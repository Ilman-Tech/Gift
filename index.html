<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="index.css" rel="stylesheet">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.1/jquery.min.js"></script>
        <title>َARISA...🌸</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=Libre+Bodoni:ital,wght@0,400..700;1,400..700&family=Vazirmatn:wght@100..900&display=swap" rel="stylesheet">
    </head>
    <body>
        <!-- deploy again -->
        <div class="envelope-wrapper">
            <div id="envelope" class="close">
                <div class="front flap"></div>
                <div class="front pocket"></div>
                <div class="letter">
                    <p class="words line1">تولدت مبارک اریسا 🎉</p>
                    <p class="words line2">میدوارم سال جدید زندگیت پر از حال خوب</p>
                    <p class="words line3">و اتفاقای قشنگ باشه.</p>
                    <p class="words line4">خوشحالم که باهات آشنا شدم.</p>
                </div>
                <div class="hearts">
                    <div class="heart a1"></div>
                    <div class="heart a2"></div>
                    <div class="heart a3"></div>
                </div>
            </div>
        </div>
        <div class="reset">
            <button id="open">Open</button>
            <button id="reset">Reset</button>
        </div>

        
        <!-- <h1 class="valentine">Happy Valentine's Day!</h1> -->
        <script src="index.js"></script>
    </body>
</html>
